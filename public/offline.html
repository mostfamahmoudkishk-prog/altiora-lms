<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أنت غير متصل بالإنترنت | Altiora</title>
    <style>
      :root {
        --background: #0f172a;
        --card: #1e293b;
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--background);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 480px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.3),
          0 8px 10px -6px rgba(0, 0, 0, 0.3);
      }

      .icon-wrapper {
        width: 80px;
        height: 80px;
        background: rgba(79, 70, 229, 0.15);
        color: var(--primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }

      .icon-wrapper svg {
        width: 40px;
        height: 40px;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      p {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s ease-in-out;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
      }

      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrapper">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.284 16.284A3 3 0 0 0 12 21m0 0a3 3 0 0 0 3.716-4.716m-3.716 4.716A3 3 0 0 1 8.284 16.284m7.432 0A3 3 0 0 0 12 11.284m0 0a3 3 0 0 0-3.716 4.716m3.716-4.716A3 3 0 0 1 15.716 16.284M12 11.284a3 3 0 0 0-3.716-4.716m3.716 4.716a3 3 0 0 0 3.716-4.716m-3.716 4.716A3 3 0 0 1 8.284 11.284m7.432 0a3 3 0 0 0-3.716-4.716m-7.432 0A3 3 0 0 1 12 1.284m0 0a3 3 0 0 1 3.716 4.716"
          />
        </svg>
      </div>
      <h1>عذراً، لا يوجد اتصال بالإنترنت</h1>
      <p>
        يبدو أنك غير متصل بالشبكة حالياً. يرجى التحقق من اتصال الواي فاي أو بيانات الهاتف المحمول ثم
        المحاولة مرة أخرى.
      </p>
      <button class="btn" onclick="retryConnection()">إعادة المحاولة</button>
    </div>

    <script>
      function retryConnection() {
        const btn = document.querySelector(".btn");
        btn.textContent = "جاري التحقق...";
        btn.disabled = true;

        // Ping favicon with query parameter to bypass service worker cache
        fetch("/favicon.png?cb=" + Date.now())
          .then((response) => {
            if (response.ok) {
              window.location.reload();
            } else {
              resetButton();
            }
          })
          .catch(() => {
            setTimeout(resetButton, 1000);
          });
      }

      function resetButton() {
        const btn = document.querySelector(".btn");
        btn.textContent = "إعادة المحاولة";
        btn.disabled = false;
      }
    </script>
  </body>
</html>
